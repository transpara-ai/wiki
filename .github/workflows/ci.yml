name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Stats unit tests (deterministic, stdlib only)
        run: python3 compile/test_stats.py
