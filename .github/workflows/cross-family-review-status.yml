name: Cross-Family Review Status

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read      # actions/checkout of the trusted base branch
  statuses: write     # read + write the cross-family-adversarial-review status

concurrency:
  group: cross-family-review-status-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  seed-status:
    name: Seed external review status
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # pull_request_target runs with a privileged token (statuses: write). Check
      # out the BASE commit the event fired against (base.sha) — never the PR head,
      # and pinned to a SHA so a base-branch advance before this queued run starts
      # cannot swap in a different (or moved-away) revision. We only ever run
      # trusted, already-reviewed code; a PR editing the seed script cannot affect
      # its own seed run (it takes effect only after merge, i.e. after CFAR).
      - name: Check out trusted base-branch code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
      - name: Seed or preserve cross-family review status
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_TIME: ${{ github.event.pull_request.updated_at }}
        # Re-seeds pending UNLESS a terminal status is provably newer than this
        # event, so a queue-delayed run cannot clobber a fresh gate success
        # (the PR #70 TOCTOU). The script only calls the GitHub API — it never
        # checks out or executes PR-head code.
        run: python3 compile/seed_cross_family_status.py
